version: '3.8'

services:
  frontend-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: itea_dept_portal_frontend
    ports:
      - "3000:80"
    networks:
      - itea_dept_portal_backend_default
    restart: always

networks:
  itea_dept_portal_backend_default:
    external: true

server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls dynamically to backend Render HTTPS service
    location /api {
        resolver 8.8.8.8 1.1.1.1 valid=30s ipv6=off;
        set $backend_service "https://itea-dept-portal-backend-gdqr.onrender.com";
        proxy_pass $backend_service;

        proxy_ssl_server_name on;
        proxy_set_header Host "itea-dept-portal-backend-gdqr.onrender.com";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
